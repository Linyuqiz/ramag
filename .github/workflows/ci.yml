name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # GPUI 编译耗时较高，加大缓存
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: cargo check + test + clippy + fmt
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖（GPUI macOS 需要的工具链）
        run: |
          # macOS 默认带 Xcode CLT，无需额外操作
          rustc --version || true

      - name: 安装 Rust toolchain（按 rust-toolchain.toml 自动选择）
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-16
          components: rustfmt, clippy

      - name: 缓存 Cargo 依赖
        uses: Swatinem/rust-cache@v2
        with:
          # 区分 workspace
          key: ramag-v1

      - name: 单文件 600 行红线门禁
        # CLAUDE.md 强制规则：单 .rs 不超 600 行（超过即重构债务）
        # 找到任意 > 600 行的 .rs 文件即让 CI 失败，附带超标清单
        run: |
          OVER=$(find crates -name "*.rs" -not -path "*/target/*" -exec wc -l {} \; | awk '$1 > 600' | sort -rn)
          if [ -n "$OVER" ]; then
            echo "❌ 以下文件超过 600 行红线（CLAUDE.md 强制规则）:" >&2
            echo "$OVER" >&2
            echo "请按职责拆分到子模块。" >&2
            exit 1
          fi
          echo "✅ 所有 .rs 文件 ≤ 600 行"

      - name: 检查格式
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace
