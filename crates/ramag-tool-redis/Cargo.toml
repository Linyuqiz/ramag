[package]
name = "ramag-tool-redis"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Ramag Redis 工具：实现 Tool trait + 提供 Redis GUI（连接、Key 浏览、命令行）"

[lints]
workspace = true

[dependencies]
ramag-domain = { workspace = true }
ramag-app = { workspace = true }
ramag-ui = { workspace = true }

# GPUI
gpui = { workspace = true }
gpui-component = { workspace = true }

# 异步组合（key_detail 并发拉值 + TTL 用 futures::join）
futures = { workspace = true }

# Pub/Sub 时间戳格式化
chrono = { workspace = true }

# 值显示增强：Stage 18.3
# - serde_json：JSON pretty 渲染
# - base64：Bytes ↔ base64 切换显示
# - flate2：Gzip 自动解压（magic 1f 8b 检测后透明解压）
serde_json = { workspace = true }
base64 = "0.22"
flate2 = "1"

# Action 派生需要
serde = { workspace = true }
schemars = { workspace = true }

# 日志
tracing = { workspace = true }
